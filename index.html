<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0F1419" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lenmot" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/jpeg" href="/lenmot-logo.jpg" />
    <link rel="apple-touch-icon" href="/lenmot-logo.jpg" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Lenmot App</title>
    <meta name="description" content="Lovable Generated Project" />
    <meta name="author" content="Lovable" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Lovable App" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 20% 20%, #263148 0%, #0f1419 58%);
        color: #f2f2f7;
        font-family: "Space Grotesk", sans-serif;
        transition: opacity 220ms ease;
      }

      #app-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #app-splash .splash-logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #e8a838;
        color: #0f1419;
        font-size: 30px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #app-splash .splash-name {
        margin-top: 14px;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      #app-splash .splash-subtitle {
        margin-top: 6px;
        font-size: 12px;
        opacity: 0.85;
        font-family: Inter, sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="app-splash" aria-hidden="true">
      <div class="splash-logo">L</div>
      <div class="splash-name">Lenmot</div>
      <div class="splash-subtitle">Construction Field Information System</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
